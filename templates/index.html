async function saveChat(){

    let chats = JSON.parse(
        localStorage.getItem("srg_chats")
    ) || [];

    let existingChat = chats.find(
    chat => chat.id === currentChatId
);

    if(existingChat){

        existingChat.messages = [...currentChat];
    }

    else{

        chats.unshift({

    id:currentChatId,

    title:currentChatTitle,

    messages:[...currentChat]
});
    }

    localStorage.setItem(
        "srg_chats",
        JSON.stringify(chats)
    );

    localStorage.setItem(
    "active_chat_id",
    currentChatId
);

    try{

    if(!auth.currentUser){
        return;
    }

    const q = query(

        collection(
            db,
            "users",
            auth.currentUser.uid,
            "chats"
        )

    );

    const snapshot = await getDocs(q);

    console.log("Firebase documents:", snapshot.size);

snapshot.forEach(doc=>{
    console.log(doc.data());
});

    let existingDocId =
    null;

    snapshot.forEach(d => {

        if(
            d.data().chatId ===
            currentChatId
        ){

            existingDocId =
            d.id;
        }

    });

    if(existingDocId){

        await updateDoc(

            doc(
                db,
                "users",
                auth.currentUser.uid,
                "chats",
                existingDocId
            ),

            {

                title:
                currentChatTitle,

                messages:
                currentChat,

                pinned:
                chats.find(
                    c => c.id === currentChatId
                )?.pinned || false

            }
        );

        console.log(
            "Firebase chat updated"
        );

    }

    else{

        await addDoc(

            collection(
                db,
                "users",
                auth.currentUser.uid,
                "chats"
            ),

            {

                chatId:
                currentChatId,

                title:
                currentChatTitle,

                messages:
                currentChat,

                pinned:
                false,

                createdAt:
                Date.now()
            }
        );

        console.log(
            "Firebase chat created"
        );
    }

}
catch(error){

    console.error(
        "Firebase save error:",
        error
    );
}
    
loadHistory();

async function savePinnedStatus(chatId,pinned){

    try{

        if(!auth.currentUser){
            return;
        }

        const q = query(
            collection(
                db,
                "users",
                auth.currentUser.uid,
                "chats"
            )
        );

        const snapshot =
        await getDocs(q);

        snapshot.forEach(async(d)=>{

            if(
                d.data().chatId === chatId
            ){

                await updateDoc(

                    doc(
                        db,
                        "users",
                        auth.currentUser.uid,
                        "chats",
                        d.id
                    ),

                    {
                        pinned:pinned
                    }
                );
            }
        });

    }

    catch(error){

        console.error(
            "Pin update error:",
            error
        );
    }
}

async function loadChatsFromFirebase(){

    if(!auth.currentUser){

        console.log(
            "No user logged in"
        );

        return;
    }

    try{

        const q = query(

            collection(
                db,
                "users",
                auth.currentUser.uid,
                "chats"
            ),

            orderBy(
                "createdAt",
                "desc"
            )
        );

        const snapshot =
        await getDocs(q);

        let chats = [];

        snapshot.forEach(doc => {

            chats.push({

    id: doc.data().chatId,
    title: doc.data().title,
    messages: doc.data().messages,
    pinned: doc.data().pinned || false

});

        });

        localStorage.setItem(
    "srg_chats",
    JSON.stringify(chats)
);


        console.log("Chats downloaded:", chats.length);

if(chats.length > 0){

    localStorage.setItem(
        "active_chat_id",
        chats[0].id
    );

}

        console.log(
            "Firebase chats loaded"
        );

        loadHistory();

        loadLastOpenedChat();

    }

    catch(error){

        console.error(
            "Firebase load error:",
            error
        );
    }
}

function loadLastOpenedChat(){

    let activeChatId =
localStorage.getItem("active_chat_id");

    if(!activeChatId){

        localStorage.getItem("srg_chats")
    ) || [];

    if(chats.length === 0){
        return;
    }

    localStorage.setItem(
        "active_chat_id",
        chats[0].id
    );

    activeChatId = chats[0].id;
    

}

    let chats = JSON.parse(
        localStorage.getItem(
            "srg_chats"
        )
    ) || [];

const micButton = document.getElementById("micButton");

const SpeechRecognition =
    window.SpeechRecognition ||
    window.webkitSpeechRecognition;

if (SpeechRecognition) {

    const recognition = new SpeechRecognition();


    recognition.lang = "en-IN";
    recognition.continuous = false;
    recognition.interimResults = false;

    micButton.onclick = () => {

        try{
            recognition.start();
        }
        catch(e){
        console.log("Recognition already running");
        }

        micButton.innerHTML = "🔴";

        micButton.disabled = true;

    };

    recognition.onresult = (event) => {

        const transcript =
            event.results[0][0].transcript;

        console.log("Voice:", transcript);

        userInput.value = transcript;

        micButton.innerHTML = "🤖";

        sendMessage();

    };

    recognition.onend = () => {

        micButton.innerHTML = "🎙";
        micButton.disabled = false;

    };

    recognition.onerror = (event) => {

        console.error(event.error);

        if(event.error === "not-allowed"){
            alert("Please allow microphone permission.");
        }

        if(event.error === "no-speech"){
           alert("No speech detected.");
        }

        micButton.innerHTML = "🎙";
        micButton.disabled = false;

    };

}
else{

    alert("Speech Recognition is not supported in this browser.");

}

function speakText(text){

    if(speechSynthesis.speaking){
        speechSynthesis.cancel();
    }

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-IN";

    speech.rate = 1;

    speech.pitch = 1;

    speech.volume = 1;

    speechSynthesis.speak(speech);

}

document.addEventListener("click", async function(e){

    // COPY
    if(e.target.closest(".copy-user-btn")){

        const btn = e.target.closest(".copy-user-btn");

        const text = btn
            .closest(".user-msg")
            .querySelector(".user-text")
            .innerText;

        await navigator.clipboard.writeText(text);

        btn.innerHTML = "✅";

        setTimeout(()=>{
            btn.innerHTML = "📋";
        },1000);

        return;
    }

    // EDIT
    if(e.target.closest(".edit-user-btn")){

        const btn = e.target.closest(".edit-user-btn");

        const text = btn
            .closest(".user-msg")
            .querySelector(".user-text")
            .innerText;

        userInput.value = text;
        userInput.focus();

        userInput.style.height = "auto";
        userInput.style.height =
            userInput.scrollHeight + "px";

        return;
    }

    // DELETE
    if(e.target.closest(".delete-user-btn")){

    const btn =
    e.target.closest(".delete-user-btn");

    const userMsg =
    btn.closest(".user-msg");

    const aiMsg =
    userMsg.nextElementSibling;

    const allMessages =
    [...document.querySelectorAll(
        ".user-msg,.ai-msg"
    )];

    const index =
    allMessages.indexOf(userMsg);

    if(aiMsg &&
       aiMsg.classList.contains("ai-msg")){

        aiMsg.remove();

    }

    userMsg.remove();

    currentChat.splice(index,2);

    saveChat();

    return;
}

});
