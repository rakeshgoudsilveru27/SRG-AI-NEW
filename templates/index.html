function cleanMarkdownText(text = "") {
    return String(text || "")
        .replace(/\r\n/g, "\n")
        .replace(/[ \t]+\n/g, "\n")
        .replace(/\n\s*\n\s*\n+/g,"\n\n")
        .split("\n")
        .map((line) => line.replace(/\s+$/g, ""))
        .join("\n")
        .replace(/^\s+|\s+$/g, "")
        .trim();
}

function sanitizeRenderedHtml(html = "") {
    const temp = document.createElement("div");
    temp.innerHTML = String(html || "");

    const emptySelectors = "p, div, blockquote, pre, ul, ol, li, table, tr, td, th, h1, h2, h3, h4, h5, h6";

    temp.querySelectorAll(emptySelectors).forEach((node) => {
        const isEmptyWrapper = node.textContent.trim() === "" && node.querySelectorAll("img, pre, table, ul, ol").length === 0;
        const isEmptyParagraph = node.tagName === "P" && node.innerHTML.replace(/<br\s*\/?>/gi, "").trim() === "";

        if (isEmptyWrapper || isEmptyParagraph) {
            node.remove();
        }
    });

    temp.querySelectorAll("p").forEach(p=>{
    while(
        p.firstChild &&
        p.firstChild.nodeName==="BR"
    ){
        p.removeChild(p.firstChild);
    }

    while(
        p.lastChild &&
        p.lastChild.nodeName==="BR"
    ){
        p.removeChild(p.lastChild);
    }
});

    return temp.innerHTML.replace(/>\s+</g, "><").trim();
}

function renderMarkdown(text = "") {
    const cleaned = cleanMarkdownText(text);
    const html = marked.parse(cleaned || "");
    return sanitizeRenderedHtml(html);
}

function escapeHtml(value = "") {
    return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/\"/g, "&quot;")
        .replace(/'/g, "&#39;");
}

let pendingImageFile = null;
let pendingImagePreviewUrl = "";
let currentImageViewer = { url: "", scale: 1 };

function createImagePreview(file) {
    if (!file) return;

    const allowedTypes = ["image/png", "image/jpeg", "image/jpg", "image/webp"];
    const fileName = (file.name || "").toLowerCase();
    const isAllowed = allowedTypes.includes(file.type) || /\.(png|jpe?g|webp)$/i.test(fileName);

    if (!isAllowed) {
        alert("Please choose a PNG, JPG, JPEG, or WEBP image.");
        return;
    }

    if (pendingImagePreviewUrl) {
        URL.revokeObjectURL(pendingImagePreviewUrl);
    }

    pendingImageFile = file;
    pendingImagePreviewUrl = URL.createObjectURL(file);

    const previewArea = document.getElementById("imagePreviewArea");
    previewArea.innerHTML = "";

    const card = document.createElement("div");
    card.className = "image-preview-card";

    const img = document.createElement("img");
    img.src = pendingImagePreviewUrl;
    img.alt = "Selected image preview";
    img.onclick = () => openImageViewer(pendingImagePreviewUrl, file.name);

    const removeBtn = document.createElement("button");
    removeBtn.className = "image-preview-remove";
    removeBtn.innerHTML = "×";
    removeBtn.onclick = (event) => {
        event.stopPropagation();
        removeImagePreview();
    };

    card.appendChild(img);
    card.appendChild(removeBtn);
    previewArea.appendChild(card);
}

function removeImagePreview() {
    if (pendingImagePreviewUrl) {
        URL.revokeObjectURL(pendingImagePreviewUrl);
    }

    pendingImageFile = null;
    pendingImagePreviewUrl = "";

    const previewArea = document.getElementById("imagePreviewArea");
    if (previewArea) {
        previewArea.innerHTML = "";
    }

    const imageInput = document.getElementById("imageInput");
    if (imageInput) {
        imageInput.value = "";
    }
}

function openImageViewer(imageUrl, title = "") {
    const overlay = document.getElementById("imageViewerOverlay");
    const viewerImage = document.getElementById("imageViewerImage");

    if (!overlay || !viewerImage) return;

    currentImageViewer.url = imageUrl;
    currentImageViewer.scale = 1;
    viewerImage.src = imageUrl;
    viewerImage.alt = title || "Image viewer";
    viewerImage.style.setProperty("--viewer-scale", "1");
    overlay.hidden = false;
    document.body.style.overflow = "hidden";
}

function closeImageViewer() {
    const overlay = document.getElementById("imageViewerOverlay");
    if (overlay) {
        overlay.hidden = true;
    }
    document.body.style.overflow = "";
    currentImageViewer.scale = 1;
}

async function generateImage(prompt) {
    if (!prompt) return;

    const chatBox = document.getElementById("chatMessages");

    let typingDiv = document.createElement("div");
    typingDiv.className = "ai-msg";
    typingDiv.id = "typing";
    typingDiv.innerHTML = `
    <div class="dot-loader">
        <span></span>
        <span></span>
        <span></span>
    </div>
    `;
    chatBox.appendChild(typingDiv);

    try {
        const formData = new FormData();
        formData.append("prompt", prompt);

        const response = await fetch("/generate-image", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (typingDiv) {
            typingDiv.remove();
        }

        if (!response.ok || !data.image_url) {
            throw new Error(data.error || "Image generation failed.");
        }

        chatBox.insertAdjacentHTML("beforeend", renderGeneratedImage(prompt, data.image_url));
        attachGeneratedImageActions(chatBox);
        saveGeneratedImage(prompt, data.image_url);
        scrollToBottom();
    }
    catch (error) {
        if (typingDiv) {
            typingDiv.remove();
        }

        chatBox.insertAdjacentHTML("beforeend", `<div class="ai-msg">⚠ Unable to generate image.</div>`);
        console.error("IMAGE GENERATION ERROR:", error);
    }
}

    const chatBox =
    document.getElementById(

    if(!chatBox) return;

    requestAnimationFrame(()=>{

        chatBox.scrollTop =

        },100);

        },300);

    });
}

async function saveChat(){

    let chats = JSON.parse(
        localStorage.getItem("srg_chats")
    ) || [];

    let existingChat = chats.find(
    chat => chat.id === currentChatId
);

    if(existingChat){

        existingChat.messages = [...currentChat];
    }

    else{

        chats.unshift({

    id:currentChatId,

    title:currentChatTitle,

    messages:[...currentChat]
});
    }

    localStorage.setItem(
        "srg_chats",
        JSON.stringify(chats)
    );

    localStorage.setItem(
    "active_chat_id",
    currentChatId
);

    try{

    if(!auth.currentUser){
        return;
    }

    const q = query(

        collection(
            db,
            "chats"
        )

    );

    const snapshot = await getDocs(q);

    console.log("Firebase documents:", snapshot.size);

snapshot.forEach(doc=>{
    console.log(doc.data());
});

    let existingDocId =
    null;

    snapshot.forEach(d => {

        if(
            d.data().chatId ===
            currentChatId
        ){

            existingDocId =
            d.id;
        }

    });

    if(existingDocId){

        await updateDoc(

            doc(
                db,
                "users",
                auth.currentUser.uid,
                "chats",
                existingDocId
            ),

            {

                title:
                currentChatTitle,

                messages:
                currentChat,

                pinned:
                chats.find(
                    c => c.id === currentChatId
                )?.pinned || false

            }
        );

        console.log(
            "Firebase chat updated"
        );

    }

    else{

        await addDoc(

            collection(
                db,
                "users",
                auth.currentUser.uid,
                "chats"
            ),

            {

                chatId:
                currentChatId,

                title:

                messages:
                currentChat,

                pinned:
                false,

                createdAt:
                Date.now()
            }
        );

        console.log(
            "Firebase chat created"
        );
    }

}
catch(error){

function loadHistory(){

    let historyBox =
    document.getElementById("historyList");

    historyBox.innerHTML = "";

    let chats = JSON.parse(
        localStorage.getItem("srg_chats")
    ) || [];

    const searchInput =
    document.getElementById("historySearch");

    const searchText =
    searchInput.value.toLowerCase();

    chats = chats.filter(chat => {

        const titleMatch =
        (chat.title || "")
        .toLowerCase()
        .includes(searchText);

        const messageMatch =
        chat.messages.some(msg =>
            msg.text.toLowerCase()
            .includes(searchText)
        );

        return titleMatch || messageMatch;
    });

    const pinnedChats =
    chats.filter(chat => chat.pinned);

    const normalChats =
    chats.filter(chat => !chat.pinned);

    function renderChats(chatArray){

    chatArray.forEach(chat => {

        let item =
        document.createElement("div");

        item.className = "history-wrapper";

        item.innerHTML = `

        <div class="history-item">
            ${chat.pinned ? "📌 " : ""}${chat.title}
        </div>

        <div class="history-menu-container">

            <button class="history-menu-btn">
                ⋮
            </button>

            <div class="history-dropdown">

                <button class="pin-chat">
                    📌 Pin
                </button>

                <button class="rename-chat">
                    ✏ Rename
                </button>

                <div class="share-container">

                    <button class="share-chat">
                        📤 Share
                    </button>

                    <div class="share-dropdown">

                        <button class="copy-chat">
                            📋 Copy Chat
                        </button>

                        <button class="export-txt">
                            📄 Export TXT
                        </button>

                        <button class="share-image">
                            🖼 Share as Image
                        </button>

                        <button class="share-link">
                            🔗 Share Link
                        </button>

                    </div>

                </div>

                <button class="group-chat">
                    👥 Group
                </button>

                <button class="delete-chat">
                    🗑 Delete
                </button>

            </div>

        </div>
        `;

        item.onclick = function(e){

            if(
                e.target.closest(
                    ".history-menu-container"
                )
            ){
                return;
            }

            currentChat = [...chat.messages];
            currentChatTitle = chat.title;
            currentChatId = chat.id;
            localStorage.setItem(
                "active_chat_id",
                chat.id
            );
            sidebar.classList.remove("active");

            overlay.classList.remove("active");

            document.querySelector(".welcome")
            .style.display = "none";

            const features =
            document.querySelector(".features");

            if(features){
                features.style.display =
                "none";
            }

            let chatBox =
            document.getElementById("chatMessages");

            renderMessagesIntoChat(chatBox, chat.messages);

            setTimeout(()=>{

                const userMessages =
                chatBox.querySelectorAll(
                    ".user-msg"
                );

                const lastUserMessage =
                userMessages[
                    userMessages.length - 1
                ];

                if(lastUserMessage){

                    lastUserMessage.scrollIntoView({

                        behavior:"smooth",

                        block:"start"

                    });
                }

            },50);
        };

        const menuBtn =
        item.querySelector(".history-menu-btn");

        const dropdown =
        item.querySelector(".history-dropdown");

        menuBtn.onclick = function(e){

            e.stopPropagation();

            document
            .querySelectorAll(".history-dropdown")
            .forEach(menu => {

                if(menu !== dropdown){
                    menu.classList.remove(
                        "show-dropdown"
                    );
                }
            });

            dropdown.classList.toggle(
                "show-dropdown"
            );
        };

        const shareBtn =
        item.querySelector(".share-chat");

        const shareDropdown =
        item.querySelector(".share-dropdown");

        shareBtn.onclick = function(e){

    e.preventDefault();

    e.stopPropagation();

    shareDropdown.classList.toggle(
        "show-share"
    );
}

        item.querySelector(".copy-chat")
        .onclick = function(e){

            e.stopPropagation();

            let text = chat.messages
            .map(m =>
                `${m.type.toUpperCase()}:
${m.text}`
            )
            .join("");

            navigator.clipboard.writeText(text);

            console.log("Chat copied");
            shareDropdown.classList.remove(
                "show-share"
            );
        };

        item.querySelector(".export-txt")
        .onclick = function(e){

            e.stopPropagation();

            let text = chat.messages
            .map(m =>
                `${m.type.toUpperCase()}:
${m.text}`
            )
            .join("");

            let blob = new Blob(
                [text],
                {type:"text/plain"}
            );

            let link =
            document.createElement("a");

            link.href =
            URL.createObjectURL(blob);

            link.download =
            `${chat.title
            .replace(/[^a-z0-9]/gi,"_")}.txt`;

            link.click();

            shareDropdown.classList.remove(
                "show-share"
            );
        };

        item.querySelector(".share-image")
        .onclick = function(e){

            e.stopPropagation();

            alert(
                "Image export coming soon!"
            );
        };

        item.querySelector(".share-link")
        .onclick = function(e){

            e.stopPropagation();

            alert(
                "Cloud sharing coming soon!"
            );
        };

        item.querySelector(".pin-chat")
        .onclick = function(e){

            e.stopPropagation();

            let chats = JSON.parse(
                localStorage.getItem("srg_chats")
            ) || [];

            chats = chats.map(c => {

                if(c.id === chat.id){
                c.pinned = !c.pinned;

                 savePinnedStatus(
                c.id,
                c.pinned
                );
}

                return c;
            });

            chats.sort((a,b)=>
                (b.pinned===true) -
                (a.pinned===true)
            );

            localStorage.setItem(
                "srg_chats",
                JSON.stringify(chats)
            );


            dropdown.classList.remove(
                "show-dropdown"
            );

            loadHistory();
            loadLastOpenedChat();            
        };

        item.querySelector(".rename-chat")
        .onclick = function(e){

            e.stopPropagation();

            let newName = prompt(
                "Enter new chat name:",
                chat.title
            );

            if(!newName || newName.trim()===""){
                return;
            }

            let chats = JSON.parse(
                localStorage.getItem("srg_chats")
            ) || [];

            chats = chats.map(c => {

                if(c.id === chat.id){
                    c.title = newName;
                }

                return c;
            });

            localStorage.setItem(
                "srg_chats",
                JSON.stringify(chats)
            );

            currentChatTitle = newName;

            dropdown.classList.remove(
                "show-dropdown"
            );

            loadHistory();
        };

        item.querySelector(".delete-chat")
        .onclick = function(e){

            e.stopPropagation();

            let chats = JSON.parse(
                localStorage.getItem("srg_chats")
            ) || [];

            chats = chats.filter(
                c => c.id !== chat.id
            
            );
            deleteChatFromFirebase(
                chat.id
            );

            localStorage.setItem(
                "srg_chats",
                JSON.stringify(chats)
            );

            dropdown.classList.remove(
                "show-dropdown"
            );

            loadHistory();
        };

        item.querySelector(".group-chat")
        .onclick = function(e){

            e.stopPropagation();

            alert(
                "Group chat feature coming soon!"
            );
        };

        historyBox.appendChild(item);
    });
    }

    if(pinnedChats.length > 0){

    let pinnedTitle =
    document.createElement("div");

    pinnedTitle.className =
    "history-category";

    pinnedTitle.innerText =
    "📌 Pinned";

    historyBox.appendChild(
        pinnedTitle
    );
}

    renderChats(pinnedChats);

    if(normalChats.length > 0){

    let recentTitle =
    document.createElement("div");

    recentTitle.className =
    "history-category";

    recentTitle.innerText =
    "🕘 Recent";

    historyBox.appendChild(
        recentTitle
    );
}

    renderChats(normalChats);
}

async function savePinnedStatus(chatId,pinned){

        const q = query(
            collection(
                db,
                "users",
                auth.currentUser.uid,
                "chats"
            )
        );

        const snapshot =
        await getDocs(q);

        snapshot.forEach(async(d)=>{

            if(
                d.data().chatId === chatId
            ){

                await updateDoc(

                    doc(
                        db,
                        "users",
                        auth.currentUser.uid,
                        "chats",
                        d.id
                    ),

                    {
                        pinned:pinned
                    }
                );
            }
        });

    }

    catch(error){

        console.error(
            "Pin update error:",
            error
        );
    }
}

async function loadChatsFromFirebase(){

    if(!auth.currentUser){

        console.log(
            "No user logged in"
        );

        return;
    }

    try{

        const q = query(

            collection(
                db,
                "users",
                auth.currentUser.uid,
                "chats"
            ),

            orderBy(
                "createdAt",
                "desc"
            )
        );

        const snapshot =
        await getDocs(q);

        let chats = [];

        snapshot.forEach(doc => {

            chats.push({

    id: doc.data().chatId,
    title: doc.data().title,
    messages: doc.data().messages,
    pinned: doc.data().pinned || false

});

        });

        localStorage.setItem(
    "srg_chats",
    JSON.stringify(chats)
);

if(chats.length > 0){

        );

        micButton.innerHTML = "🤖";

        sendMessage();

    };

    recognition.onend = () => {

    };

    recognition.onerror = (event) => {

        console.error(event.error);

        if(event.error === "not-allowed"){
            alert("Please allow microphone permission.");
        }

        if(event.error === "no-speech"){
           alert("No speech detected.");
        }

        micButton.innerHTML = "🎙";
        micButton.disabled = false;

    };

}
else{

    alert("Speech Recognition is not supported in this browser.");

}

function speakText(text){

    if(speechSynthesis.speaking){
        speechSynthesis.cancel();
    }

    const speech = new SpeechSynthesisUtterance(text);

    speech.lang = "en-IN";

    speech.rate = 1;

    speech.pitch = 1;

    speech.volume = 1;

    speechSynthesis.speak(speech);

}

document.addEventListener("click", async function(e){

    // COPY
    if(e.target.closest(".copy-user-btn")){

        const btn = e.target.closest(".copy-user-btn");

        const text = btn
            .closest(".user-msg")
            .querySelector(".user-text")
            .innerText;

        await navigator.clipboard.writeText(text);

        btn.innerHTML = "✅";

        setTimeout(()=>{
            btn.innerHTML = "📋";
        },1000);

        return;
    }

    // EDIT
    if(e.target.closest(".edit-user-btn")){

        const btn = e.target.closest(".edit-user-btn");

        const text = btn
            .closest(".user-msg")
            .querySelector(".user-text")
            .innerText;

        userInput.value = text;
        userInput.focus();

        userInput.style.height = "auto";
        userInput.style.height =
            userInput.scrollHeight + "px";

        return;
    }

    // DELETE
    if(e.target.closest(".delete-user-btn")){

    const btn =
    e.target.closest(".delete-user-btn");

    const userMsg =
    btn.closest(".user-msg");

    const aiMsg =
    userMsg.nextElementSibling;

    const allMessages =
    [...document.querySelectorAll(
        ".user-msg,.ai-msg"
    )];

    const index =
    allMessages.indexOf(userMsg);

    if(aiMsg &&
       aiMsg.classList.contains("ai-msg")){

        aiMsg.remove();

    }

    userMsg.remove();

    currentChat.splice(index,2);

    saveChat();

    return;
}

});
